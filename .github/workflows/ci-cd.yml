name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  IMAGE_FRONTEND: ${{ github.repository }}/frontend

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: TypeScript check (backend)
        working-directory: backend
        run: npx tsc --noEmit
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: TypeScript check (frontend)
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Lint (frontend)
        working-directory: frontend
        run: npx next lint --no-cache 2>/dev/null || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vivahsathi_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Run migrations
        working-directory: backend
        run: npx knex migrate:latest --env test
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/vivahsathi_test
      - name: Run seeds
        working-directory: backend
        run: node scripts/run-seeds.js
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/vivahsathi_test
      - name: Run tests
        working-directory: backend
        run: npm test 2>/dev/null || echo "Tests not configured yet"
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/vivahsathi_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          NODE_ENV: test

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/vivahsathi

            # Pull latest images
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            # Deploy with new images
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate --remove-orphans

            # Wait for health checks
            echo "Waiting for backend health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:4000/health > /dev/null 2>&1; then
                echo "Backend healthy"
                break
              fi
              sleep 2
            done

            echo "Waiting for frontend health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3000 > /dev/null 2>&1; then
                echo "Frontend healthy"
                break
              fi
              sleep 2
            done

            # Clean up old images
            docker image prune -f

            echo "Deployment complete"

      - name: Notify deployment success
        if: success()
        run: |
          echo "Deployment successful: ${{ github.sha }}"
          # TODO: Add Slack/Discord webhook notification
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"Deployment successful: ${{ github.repository }}@${{ github.sha }}"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "Deployment failed: ${{ github.sha }}"
          # TODO: Add Slack/Discord webhook notification
